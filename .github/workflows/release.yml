name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            version:
                description: 'Version number (e.g., 1.0.0)'
                required: true
                type: string

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        name: Create Release

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 🏷️ Get latest version
              id: get_version
              run: |
                  # Get the latest tag version
                  LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

                  # Extract version numbers
                  CURRENT_VERSION=${LATEST_TAG#v}
                  IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
                  MAJOR=${VERSION_PARTS[0]:-0}
                  MINOR=${VERSION_PARTS[1]:-0}
                  PATCH=${VERSION_PARTS[2]:-0}

                  # Increment patch version for each release
                  NEW_PATCH=$((PATCH + 1))
                  NEW_VERSION="v$MAJOR.$MINOR.$NEW_PATCH"

                  # If manual version input is provided, use it
                  if [ -n "${{ inputs.version }}" ]; then
                      NEW_VERSION="${{ inputs.version }}"
                      if [[ ! $NEW_VERSION =~ ^v ]]; then
                          NEW_VERSION="v$NEW_VERSION"
                      fi
                  fi

                  echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "PREVIOUS_VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT

            - name: 📝 Generate changelog
              id: changelog
              run: |
                  VERSION="${{ steps.get_version.outputs.VERSION }}"
                  PREV="${{ steps.get_version.outputs.PREVIOUS_VERSION }}"

                  # Get commits since last tag
                  if [ "$PREV" = "v0.0.0" ]; then
                      COMMITS=$(git log --pretty=format:"%h %s" HEAD)
                  else
                      COMMITS=$(git log --pretty=format:"%h %s" $PREV..HEAD)
                  fi

                  # Generate changelog
                  cat > release_notes.md << 'EOF'
                  ## 🚀 Release $VERSION

                  ### 📝 Changes
                  $(echo "$COMMITS" | sed 's/^/- /')

                  ---

                  **Full Changelog**: https://github.com/Arseno25/laravel-hosting-deploy/compare/$PREV...$VERSION
                  EOF

                  cat release_notes.md
                  echo "notes<<EOF" >> $GITHUB_OUTPUT
                  cat release_notes.md >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: 🏷️ Create and push tag
              if: github.event_name == 'push'
              run: |
                  VERSION="${{ steps.get_version.outputs.VERSION }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -a "$VERSION" -m "Release $VERSION"
                  git push origin "$VERSION"

            - name: 🚀 Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.get_version.outputs.VERSION }}
                  name: Release ${{ steps.get_version.outputs.VERSION }}
                  body: ${{ steps.changelog.outputs.notes }}
                  draft: false
                  prerelease: false
                  generate_release_notes: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
